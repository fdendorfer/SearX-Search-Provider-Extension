      html {
        -moz-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
        -webkit-text-size-adjust: 100%;
        background-color: var(--color-base-background);
        color: var(--color-base-font);
        font-family: sans-serif;
        font-size: 0.9em;
        margin: 0;
        padding: 0;
        scroll-behavior: smooth;
        text-size-adjust: 100%;
      }

      body {
        align-items: center;
        display: flex;
        flex-direction: column;
        height: 100vh;
        justify-content: center;
        margin: 0;
        padding: 0;
      }

      main {
        margin: 0 auto;
        max-width: min(90%, 44rem);
        width: 100%;
      }

      button {
        display: flex;
      }

      svg {
        height: 1.5rem;
      }

      .title {
        margin: 4rem auto;
      }

      .title img {
        height: 4rem;
        width: 100%;
      }

      .search_box {
        border-radius: 0.8rem;
        box-shadow: var(--color-search-shadow);
        display: inline-flex;
        flex-direction: row;
        position: relative;
        white-space: nowrap;
        width: 100%;
      }

      #q {
        background: none repeat scroll 0 0 var(--color-search-background);
        border-radius: 0.8rem 0 0 0.8rem;
        border: none;
        color: var(--color-search-font);
        font-size: 1.1rem;
        line-height: 1.5rem;
        outline: 0;
        padding: 0.8rem;
      }

      #q {
        padding-block-start: 1rem;
        width: 100%;
      }

      #q::-ms-clear,
      #q::-webkit-search-cancel-button {
        display: none;
      }

      #clear_search:hover {
        color: var(--color-search-background-hover);
      }

      #q:placeholder-shown + #clear_search {
        display: none;
      }

      #clear_search,
      #send_search {
        background: var(--color-search-background);
        border: none;
        color: var(--color-search-font);
        display: flex;
        outline: none;
        padding: 0.8rem;
      }

      #send_search {
        border-radius: 0 0.8rem 0.8rem 0;
      }

      #send_search:hover {
        background-color: var(--color-search-background-hover);
        color: var(--color-search-background);
        cursor: pointer;
      }

      .autocomplete {
        background-color: var(--color-autocomplete-background);
        border-radius: 10px;
        display: none;
        max-height: 0;
        overflow-y: hidden;
        position: absolute;
        text-align: left;
        top: calc(100% + 1rem);
        width: 100%;
      }

      .autocomplete:empty {
        display: none;
      }

      .autocomplete > ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
      }

      .autocomplete > ul > li {
        cursor: pointer;
        padding: 0.5rem 1rem;
        pointer-events: all;
      }

      .autocomplete > ul > li.active,
      .autocomplete > ul > li:active,
      .autocomplete > ul > li:focus,
      .autocomplete > ul > li:hover {
        background-color: var(--color-autocomplete-background-hover);
      }

      .autocomplete.open {
        background-color: var(--color-autocomplete-background);
        border-radius: 0.8rem;
        color: var(--color-autocomplete-font);
        display: block;
        max-height: 32rem;
        overflow-y: auto;
        z-index: 10;
      }

      .autocomplete.open:empty {
        display: none;
      }
    </style>
  </head>

  <body>
    <main>
      <div class="title">
        <img
          src="https://raw.githubusercontent.com/searxng/searxng/master/src/brand/searxng.svg"
          alt="SearX NG Logo"
        />
      </div>
      <form
        id="search"
        method="GET"
        action="/search"
        role="search"
      >
        <div class="search_box">
          <input
            id="q"
            name="q"
            type="text"
            placeholder="Search for..."
            autocomplete="off"
            autocapitalize="none"
            spellcheck="false"
            autocorrect="off"
            dir="auto"
            value=""
          />
          <button
            id="clear_search"
            type="reset"
            aria-label="clear"
            class="empty"
          >
            <svg
              viewBox="0 0 512 512"
              class="ion-icon-big"
              aria-hidden="true"
            >
              <path
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="32"
                d="M368 368L144 144M368 144L144 368"
              ></path>
            </svg>
          </button>
          <button
            id="send_search"
            type="submit"
            aria-label="search"
          >
            <svg
              viewBox="0 0 512 512"
              class="ion-icon-big"
              aria-hidden="true"
            >
              <path
                d="M221.09 64a157.09 157.09 0 10157.09 157.09A157.1 157.1 0 00221.09 64z"
                fill="none"
                stroke="currentColor"
                stroke-miterlimit="10"
                stroke-width="32"
              ></path>
              <path
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-miterlimit="10"
                stroke-width="32"
                d="M338.29 338.29L448 448"
              ></path>
            </svg>
          </button>

          <div class="autocomplete">
            <ul></ul>
          </div>
        </div>
      </form>
    </main>

    <script src="./newTab2.js"></script>
  </body>
</html>
